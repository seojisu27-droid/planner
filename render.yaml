# Render Blueprint — https://render.com/docs/blueprint-spec
# 배포: Render 대시보드 → New → Blueprint → 이 저장소 선택
services:
  - type: web
    name: planner
    runtime: node
    plan: free
    region: singapore        # 한국에서 가장 가까운 무료 리전
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      # 아래 값들은 보안값이라 Render 대시보드에서 직접 입력합니다 (sync: false)
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      # 선택: 특정 네이버 계정만 허용하려면 쉼표로 이메일 입력 (비우면 전체 허용)
      - key: ALLOWED_NAVER_EMAILS
        sync: false
      # 선택: 기존 단일 플래너 데이터를 넘겨받을 소유자 네이버 이메일 (1회 이관)
      - key: OWNER_NAVER_EMAIL
        sync: false
