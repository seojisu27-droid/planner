<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planner</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #FBFCFB;
    color: #13241F;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* 우측 노트 괘선 장식 */
  .ruling {
    position: absolute;
    top: 0;
    right: 0;
    width: 42%;
    height: 100%;
    background: repeating-linear-gradient(#EEF3F1 0 1px, transparent 1px 46px);
    opacity: 0.9;
    pointer-events: none;
  }
  .margin-line {
    position: absolute;
    top: 0;
    right: 38%;
    width: 1px;
    height: 100%;
    background: #F0D9D2;
    opacity: 0.7;
    pointer-events: none;
  }

  /* 사인인 블록 */
  .signin {
    position: relative;
    z-index: 2;
    padding-left: clamp(28px, 7vw, 72px);
    padding-right: 24px;
    max-width: 620px;
  }
  .signin h1 {
    font-weight: 900;
    font-size: clamp(56px, 13vw, 104px);
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: #00B491;
  }
  .signin .tagline {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.6;
    color: #6E807B;
    margin-top: 10px;
  }
  .login-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 38px;
    background: none;
    border: none;
    color: #00B491;
    font-family: inherit;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.08em;
    text-decoration: none;
    cursor: pointer;
    transition: gap 0.15s ease;
  }
  .login-link:hover { gap: 14px; }
  .login-link .chev {
    font-size: 16px;
    line-height: 1;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="ruling"></div>
  <div class="margin-line"></div>

  <main class="signin">
    <h1>PLANNER</h1>
    <p class="tagline">투두 리스트와 일정을 한 곳에서 확인하세요!</p>
    <a class="login-link" href="/auth/naver">
      LOGIN
      <span class="chev">&gt;</span>
    </a>
  </main>
</body>
</html>
