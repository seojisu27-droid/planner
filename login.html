<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planner</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Pretendard Variable', 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #f4f5f7;
    color: #2d3436;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    letter-spacing: -0.2px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .cover {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
    padding: 56px 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .logo {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #00b894, #0984e3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    box-shadow: 0 6px 16px rgba(9, 132, 227, 0.25);
  }
  .logo svg { display: block; }
  h1 {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1.4px;
    color: #2d3436;
  }
  .tagline {
    color: #636e72;
    font-size: 14px;
    margin-top: 12px;
    line-height: 1.5;
  }
  .login-btn {
    margin-top: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    background: #03C75A;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    transition: filter 0.15s, transform 0.05s;
  }
  .login-btn:hover { filter: brightness(0.96); }
  .login-btn:active { transform: translateY(1px); }
  .naver-n {
    display: inline-flex;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    background: #fff;
    color: #03C75A;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
    line-height: 1;
  }
  .foot {
    margin-top: 20px;
    font-size: 12px;
    color: #b2bec3;
  }
</style>
</head>
<body>
  <main class="cover">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="17" rx="3"></rect>
        <path d="M3 9h18"></path>
        <path d="M8 2v4"></path>
        <path d="M16 2v4"></path>
        <path d="M8.5 14.5l2.5 2.5 4.5-5"></path>
      </svg>
    </div>
    <h1>Planner</h1>
    <p class="tagline">하루의 할 일과 일정을 한 곳에서 확인하세요 !</p>
    <a class="login-btn" href="/auth/naver">
      <span class="naver-n">N</span> 네이버로 로그인
    </a>
    <p class="foot">로그인하면 내 계정의 플래너가 열립니다</p>
  </main>
</body>
</html>
